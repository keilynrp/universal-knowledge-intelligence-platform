id: science
name: Science & Research
description: "Academic papers, publications, patents, and scientific datasets"
primary_entity: "Publication"
icon: "Microscope"
attributes:
  - name: title
    type: string
    required: true
    label: "Title"
    is_core: true
  - name: authors
    type: string
    label: "Authors"
    is_core: true
  - name: doi
    type: string
    label: "DOI"
    is_core: true
  - name: journal
    type: string
    label: "Journal / Venue"
    is_core: true
  - name: year
    type: integer
    label: "Publication Year"
    is_core: true
  - name: citations
    type: integer
    label: "Citation Count"
    is_core: true
    source: enrichment_citation_count
  - name: abstract
    type: text
    label: "Abstract"
    is_core: false
  - name: keywords
    type: string
    label: "Keywords"
    is_core: false
    source: enrichment_concepts
  - name: volume
    type: string
    label: "Volume"
    is_core: false
  - name: issue
    type: string
    label: "Issue"
    is_core: false
  - name: pages
    type: string
    label: "Pages"
    is_core: false
  - name: publisher
    type: string
    label: "Publisher"
    is_core: false
  - name: issn
    type: string
    label: "ISSN"
    is_core: false
    source: enrichment_issn_l
  - name: url
    type: string
    label: "URL"
    is_core: false
  - name: language
    type: string
    label: "Language"
    is_core: false
  - name: institution
    type: string
    label: "Institution / School"
    is_core: false
    source: affiliation

epistemology:
  paradigms:
    - id: empiricist
      label: "Empiricist / Positivist"
      description: "Privileges experimental evidence, replicability, statistical significance"
      indicators:
        terms:
          - "randomized"
          - "controlled trial"
          - "p-value"
          - "statistical significance"
          - "hypothesis testing"
          - "sample size"
          - "effect size"
          - "double-blind"
          - "placebo"
          - "experimental design"
          - "regression analysis"
          - "confidence interval"
          - "longitudinal study"
          - "cohort study"
          - "cross-sectional"
          - "meta-analysis"
          - "systematic review"
          - "replicability"
          - "quantitative"
          - "empirical evidence"
        document_types:
          - "randomized controlled trial"
          - "meta-analysis"
          - "systematic review"
          - "clinical trial"
          - "cohort study"
          - "experimental study"
        journals_affinity:
          - "The Lancet"
          - "NEJM"
          - "Nature"
          - "Science"
          - "PLOS ONE"
          - "BMJ"
          - "JAMA"

    - id: constructivist
      label: "Social Constructivist"
      description: "Privileges social context, narrative, reflexivity of the researcher"
      indicators:
        terms:
          - "discourse analysis"
          - "situated knowledge"
          - "reflexivity"
          - "qualitative"
          - "ethnography"
          - "hermeneutics"
          - "phenomenology"
          - "grounded theory"
          - "interpretive"
          - "social construction"
          - "narrative analysis"
          - "participant observation"
          - "thick description"
          - "case study"
          - "lived experience"
          - "meaning-making"
          - "subjectivity"
          - "contextual"
          - "intersubjective"
          - "constructionism"
        document_types:
          - "case study"
          - "ethnographic study"
          - "narrative review"
          - "qualitative study"
          - "interview study"
        journals_affinity:
          - "Social Studies of Science"
          - "Science as Culture"
          - "Qualitative Research"
          - "Qualitative Inquiry"
          - "Human Studies"

    - id: critical
      label: "Critical Theory"
      description: "Examines power relations, inequity, structural biases"
      indicators:
        terms:
          - "power relations"
          - "hegemony"
          - "decolonial"
          - "feminist epistemology"
          - "bias"
          - "equity"
          - "justice"
          - "marginalized"
          - "intersectionality"
          - "postcolonial"
          - "critical race"
          - "structural inequality"
          - "oppression"
          - "emancipatory"
          - "participatory action"
          - "social justice"
          - "praxis"
          - "neo-liberal"
          - "subaltern"
          - "counter-narrative"
        document_types:
          - "critical review"
          - "commentary"
          - "position paper"
          - "editorial"
          - "policy brief"
        journals_affinity:
          - "Critical Inquiry"
          - "Social Text"
          - "Feminist Studies"
          - "Race Ethnicity and Education"
          - "Journal of Critical Realism"

  evidence_hierarchy:
    - level: 1
      label: "Systematic Review / Meta-analysis"
      weight: 1.0
    - level: 2
      label: "Randomized Controlled Trial"
      weight: 0.85
    - level: 3
      label: "Cohort / Longitudinal Study"
      weight: 0.70
    - level: 4
      label: "Case-Control Study"
      weight: 0.55
    - level: 5
      label: "Case Report / Series"
      weight: 0.40
    - level: 6
      label: "Expert Opinion / Editorial"
      weight: 0.25

discourse_community:
  authority_sources:
    identity:
      - orcid
      - viaf
      - openalex
    bibliographic:
      - doi
      - isbn
      - pmid
    institutional:
      - ror
      - grid
      - wikidata

  communication_channels:
    tier_1:
      label: "Core journals"
      description: "Venues with highest concentration of domain production"
      auto_detect: true
      manual_seeds:
        - "Nature"
        - "Science"
        - "PLOS ONE"
    tier_2:
      label: "Conference proceedings"
      description: "Relevant conference proceedings"
      manual_seeds: []
    tier_3:
      label: "Preprints and grey literature"
      manual_seeds:
        - "arXiv"
        - "bioRxiv"
        - "SSRN"

  validation_practices:
    - id: peer_review
      label: "Peer Review"
      weight: 1.0
      detectable: false
    - id: reproducibility
      label: "Reproducibility / Data Sharing"
      weight: 0.8
      detectable: true
      indicators:
        - "data availability"
        - "code repository"
        - "replication"
    - id: open_access
      label: "Open Access Publication"
      weight: 0.6
      detectable: true
      field: "is_open_access"

  health_metrics:
    - id: gini_authorship
      label: "Gini coefficient of authorship concentration"
      description: "0 = distributed production, 1 = concentrated in few authors"
    - id: international_collaboration_rate
      label: "Rate of multi-country co-authorships"
      description: "Fraction of entities with authors from 2+ countries"
    - id: open_access_rate
      label: "Open Access publication rate"
      description: "Fraction of entities published as Open Access"
    - id: epistemic_diversity
      label: "Shannon entropy over paradigm distribution"
      description: "0 = single paradigm dominates, 1 = perfectly diverse"
    - id: newcomer_rate
      label: "Fraction of first-time authors per year"
      description: "Rate of new entrants to the domain community"
