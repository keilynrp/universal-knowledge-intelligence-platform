# UKIP production-oriented compose for Dokploy.
# Recommended pattern:
# - Frontend domain: https://ukip.inbounduxd.com
# - API domain:      https://api.ukip.inbounduxd.com
# - PostgreSQL: managed separately in Dokploy, injected via DATABASE_URL
# - Images: pulled from GHCR after CI builds and publishes them

services:
  ukip-backend:
    image: ${UKIP_BACKEND_IMAGE:?Set UKIP_BACKEND_IMAGE}
    pull_policy: always
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      ukip-engine:
        condition: service_started
      ukip-redis:
        condition: service_healthy
    environment:
      PORT: 8000
      # Distributed cache (Redis). Defaults to the co-located ukip-redis service;
      # override REDIS_URL in Dokploy to point at a managed instance. Unset =>
      # in-process caches (single-process fallback). Fail-open on Redis errors.
      REDIS_URL: ${REDIS_URL:-redis://ukip-redis:6379/0}
      UKIP_CACHE_PREFIX: ${UKIP_CACHE_PREFIX:-ukip}
      UKIP_CACHE_CONNECT_TIMEOUT: ${UKIP_CACHE_CONNECT_TIMEOUT:-0.5}
      UKIP_CACHE_SOCKET_TIMEOUT: ${UKIP_CACHE_SOCKET_TIMEOUT:-0.5}
      RUN_DB_MIGRATIONS_ON_START: ${RUN_DB_MIGRATIONS_ON_START:-1}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?Set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
      # Staged JWT rotation (EPIC-017): old signing key(s), verify-only, during the
      # grace window. Empty => no retiring keys. Compose only passes vars it
      # declares, so this MUST be referenced here or Dokploy's value never reaches
      # the container. See docs/operating/SECRETS_ROTATION_RUNBOOK.md §2.
      JWT_SECRET_KEYS_RETIRING: ${JWT_SECRET_KEYS_RETIRING:-}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?Set SESSION_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY}
      # Staged Fernet rotation (EPIC-017): old key(s), decrypt-only, until the
      # re-encrypt completes. Empty => no retiring keys. Must be declared here for
      # the same reason as above. See SECRETS_ROTATION_RUNBOOK.md §1.
      ENCRYPTION_KEYS_RETIRING: ${ENCRYPTION_KEYS_RETIRING:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://ukip.inbounduxd.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://ukip.inbounduxd.com}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID:-}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET:-}
      SSO_METADATA_URL: ${SSO_METADATA_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # Deployment environment marker (telemetry/Sentry + /health). This compose
      # IS the prod stack, so default to production; local dev doesn't use this
      # file and keeps telemetry.py's "development" default. Override in Dokploy.
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SCHOLAR_USE_FREE_PROXIES: ${SCHOLAR_USE_FREE_PROXIES:-0}
      # OPENALEX_EMAIL also feeds the OpenAlex lake polite pool (backend/openalex_lake).
      OPENALEX_EMAIL: ${OPENALEX_EMAIL:-}
      # OpenAlex analytical lake: persistent DuckDB on a named volume so the file
      # and its incremental watermark survive redeploys. The refresh runs
      # `python -m backend.openalex_lake.pull_works` in this container via a
      # Dokploy Schedule. See backend/openalex_lake/README.md.
      OPENALEX_LAKE_DB: ${OPENALEX_LAKE_DB:-/data/openalex_lake.duckdb}
      # Paid OpenAlex credits key — lifts the ~1000 req/day free quota so the
      # backfill finishes in one run. Empty => free tier (resumable multi-day).
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      WOS_API_KEY: ${WOS_API_KEY:-}
      SCOPUS_API_KEY: ${SCOPUS_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      UKIP_ENABLE_LLM_QUERY_REFORMULATION: ${UKIP_ENABLE_LLM_QUERY_REFORMULATION:-0}
      UKIP_LLM_QUERY_REFORMULATION_MODEL: ${UKIP_LLM_QUERY_REFORMULATION_MODEL:-gpt-4o-mini}
      UKIP_LLM_QUERY_REFORMULATION_MAX_VARIANTS: ${UKIP_LLM_QUERY_REFORMULATION_MAX_VARIANTS:-3}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-0}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENABLE_TRACING: ${SENTRY_ENABLE_TRACING:-0}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-0}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_DEBUG: ${SENTRY_DEBUG:-0}
      ENGINE_GRPC_URL: ${ENGINE_GRPC_URL:-ukip-engine:50051}
      ENGINE_AUTH_TOKEN: ${ENGINE_AUTH_TOKEN:?Set ENGINE_AUTH_TOKEN}
      ENGINE_SYNC_THRESHOLD: ${ENGINE_SYNC_THRESHOLD:-500}
      ENGINE_SHADOW_MODE: ${ENGINE_SHADOW_MODE:-false}
      ENGINE_FALLBACK_PYTHON: ${ENGINE_FALLBACK_PYTHON:-true}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-45}
      DB_CONNECT_SLEEP_SECONDS: ${DB_CONNECT_SLEEP_SECONDS:-2}
      # Coauthorship V2 rollout flags. Must be referenced here or the container
      # never receives them (compose only passes vars it declares). Set the
      # values in Dokploy's Environment tab; they interpolate in below.
      COAUTHOR_V2_READ: ${COAUTHOR_V2_READ:-false}
      COAUTHOR_V2_WRITE: ${COAUTHOR_V2_WRITE:-false}
      COAUTHOR_V2_SHADOW: ${COAUTHOR_V2_SHADOW:-false}
      # Authority-control loop flags (PRs #107-#109). Same rule as above: they
      # must be declared here or the Dokploy env values never reach the
      # container. Verify effective state via /health "features".
      UKIP_AUTO_RESOLVE_ON_INGEST: ${UKIP_AUTO_RESOLVE_ON_INGEST:-0}
      UKIP_AUTHORITY_WRITEBACK: ${UKIP_AUTHORITY_WRITEBACK:-1}
      # Disambiguation clustering path. Default ON (blocking + Union-Find:
      # transitive, order-independent, F1=0.91 vs 0.86 for the legacy greedy
      # path). Pinned here so prod state is explicit, not implicit on the code
      # default. Set to 0 to fall back to the legacy path. See /health features.
      UKIP_USE_BLOCKING: ${UKIP_USE_BLOCKING:-1}
      # Provider-neutral backup assurance metadata only. Backup payload and
      # storage credentials remain in Dokploy/provider-owned configuration.
      UKIP_BACKUP_MONITOR_ENABLED: ${UKIP_BACKUP_MONITOR_ENABLED:-1}
      UKIP_BACKUP_ENVIRONMENT: ${UKIP_BACKUP_ENVIRONMENT:-production}
      UKIP_BACKUP_PROVIDER_REACHABLE: ${UKIP_BACKUP_PROVIDER_REACHABLE:-0}
      UKIP_BACKUP_PROVIDER_REACHABLE_AT: ${UKIP_BACKUP_PROVIDER_REACHABLE_AT:-}
      UKIP_BACKUP_RPO_HOURS: ${UKIP_BACKUP_RPO_HOURS:-24}
      UKIP_BACKUP_CRITICAL_AFTER_HOURS: ${UKIP_BACKUP_CRITICAL_AFTER_HOURS:-26}
    volumes:
      - ukip_static_data:/app/static
      - ukip_openalex_lake:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    expose:
      - "8000"

  ukip-engine:
    image: ${UKIP_ENGINE_IMAGE:?Set UKIP_ENGINE_IMAGE}
    pull_policy: always
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      ENGINE_DATABASE_URL: ${ENGINE_DATABASE_URL:?Set ENGINE_DATABASE_URL}
      ENGINE_GRPC_PORT: ${ENGINE_GRPC_PORT:-50051}
      ENGINE_LOG_LEVEL: ${ENGINE_LOG_LEVEL:-info}
      ENGINE_AUTH_TOKEN: ${ENGINE_AUTH_TOKEN:?Set ENGINE_AUTH_TOKEN}
      ENGINE_NODE_CHUNK_SIZE: ${ENGINE_NODE_CHUNK_SIZE:-1000}
      ENGINE_REL_CHUNK_SIZE: ${ENGINE_REL_CHUNK_SIZE:-2000}
      ENGINE_MAX_CONCURRENT_JOBS: ${ENGINE_MAX_CONCURRENT_JOBS:-4}
      ENGINE_SHUTDOWN_TIMEOUT_SECS: ${ENGINE_SHUTDOWN_TIMEOUT_SECS:-60}
    healthcheck:
      test: ["CMD", "/app/engine", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    expose:
      - "50051"

  ukip-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - dokploy-network
    # Cache-only workload: bound memory and evict LRU under pressure (every key
    # carries a TTL, so eviction is safe). Data is regenerable — the volume just
    # smooths restarts; loss is handled fail-open by the app.
    command:
      - redis-server
      - --maxmemory
      - ${UKIP_REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    volumes:
      - ukip_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "6379"

  ukip-frontend:
    image: ${UKIP_FRONTEND_IMAGE:?Set UKIP_FRONTEND_IMAGE}
    pull_policy: always
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      ukip-backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.ukip.inbounduxd.com}
    expose:
      - "3004"

  ukip-migrate:
    image: ${UKIP_BACKEND_IMAGE:?Set UKIP_BACKEND_IMAGE}
    profiles: ["ops"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?Set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?Set SESSION_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY}
      # Required by the re-encrypt script (python -m backend.scripts.rotate_encryption):
      # MultiFernet needs the retiring key(s) to decrypt rows still on the old key
      # before re-encrypting them onto the primary. See SECRETS_ROTATION_RUNBOOK.md §1.
      ENCRYPTION_KEYS_RETIRING: ${ENCRYPTION_KEYS_RETIRING:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://ukip.inbounduxd.com}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      RUN_DB_MIGRATIONS_ON_START: 0
      UKIP_BACKUP_MONITOR_ENABLED: ${UKIP_BACKUP_MONITOR_ENABLED:-1}
      UKIP_BACKUP_ENVIRONMENT: ${UKIP_BACKUP_ENVIRONMENT:-production}
      UKIP_BACKUP_PROVIDER_REACHABLE: ${UKIP_BACKUP_PROVIDER_REACHABLE:-0}
      UKIP_BACKUP_PROVIDER_REACHABLE_AT: ${UKIP_BACKUP_PROVIDER_REACHABLE_AT:-}
      UKIP_BACKUP_RPO_HOURS: ${UKIP_BACKUP_RPO_HOURS:-24}
      UKIP_BACKUP_CRITICAL_AFTER_HOURS: ${UKIP_BACKUP_CRITICAL_AFTER_HOURS:-26}
    command: ["alembic", "upgrade", "head"]
    restart: "no"

volumes:
  ukip_static_data:
  ukip_redis_data:
  ukip_openalex_lake:

networks:
  dokploy-network:
    external: true
