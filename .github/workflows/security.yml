name: Security Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Secret scan (blocking) ──────────────────────────────────────────────
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history so gitleaks scans all commits in the PR)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ── Backend dependency audit (blocking; exceptions via --ignore-vuln) ───
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit (pinned; bump intentionally — see SECURITY_GATES.md)
        run: pip install "pip-audit==2.10.1"

      - name: Audit pinned backend dependencies
        # Ratchet baseline: every --ignore-vuln entry must have a row in
        # docs/operating/SECURITY_GATES.md with justification + expiry.
        # --no-deps: requirements.lock is a flat freeze (no hashes); pip
        # resolver is disabled via --disable-pip so no network lookup needed.
        run: pip-audit -r requirements.lock --disable-pip --no-deps --ignore-vuln PYSEC-2026-25 --ignore-vuln PYSEC-2026-188 --ignore-vuln CVE-2026-45829 --ignore-vuln PYSEC-2026-35 --ignore-vuln PYSEC-2026-36 --ignore-vuln CVE-2024-23342 --ignore-vuln CVE-2026-33936 --ignore-vuln CVE-2026-45409 --ignore-vuln PYSEC-2026-87 --ignore-vuln CVE-2026-44307 --ignore-vuln PYSEC-2026-165 --ignore-vuln CVE-2026-40192 --ignore-vuln CVE-2026-42309 --ignore-vuln CVE-2026-42310 --ignore-vuln CVE-2026-42311 --ignore-vuln CVE-2026-30922 --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2025-71176 --ignore-vuln CVE-2026-40347 --ignore-vuln CVE-2026-42561 --ignore-vuln CVE-2026-25645 --ignore-vuln PYSEC-2026-161 --ignore-vuln PYSEC-2026-142 --ignore-vuln PYSEC-2026-141 --ignore-vuln GHSA-537c-gmf6-5ccf --ignore-vuln CVE-2026-53540 --ignore-vuln CVE-2026-53539 --ignore-vuln CVE-2026-53538 --ignore-vuln CVE-2026-48818 --ignore-vuln CVE-2026-48817 --ignore-vuln CVE-2026-54283 --ignore-vuln CVE-2026-54282 --ignore-vuln CVE-2026-49452

  # ── Frontend dependency audit (blocking; allowlist via wrapper) ─────────
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Run npm-audit gate
        working-directory: frontend
        run: npm run audit:gate
