name: Docker Images

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract backend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ukip-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: true
          no-cache: true
          build-args: |
            APP_VERSION=${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract frontend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ukip-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: true
          no-cache: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.ukip.inbounduxd.com' }}
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}
            APP_VERSION=${{ github.sha }}

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Trigger Dokploy deploy
        run: |
          set -euo pipefail

          dokploy_api_url="$(printf '%s' '${{ secrets.DOKPLOY_API_URL }}' | tr -d '\r\n' | sed 's:/*$::')"
          dokploy_api_key="$(printf '%s' '${{ secrets.DOKPLOY_API_KEY }}' | tr -d '\r\n')"
          dokploy_compose_id="$(printf '%s' '${{ secrets.DOKPLOY_COMPOSE_ID }}' | tr -d '\r\n')"

          if [ -z "$dokploy_api_url" ] || [ -z "$dokploy_api_key" ] || [ -z "$dokploy_compose_id" ]; then
            echo "Missing Dokploy API secrets. Set DOKPLOY_API_URL, DOKPLOY_API_KEY, and DOKPLOY_COMPOSE_ID."
            exit 1
          fi

          payload="$(
            jq -n \
              --arg composeId "$dokploy_compose_id" \
              --arg title "UKIP CI deploy" \
              --arg description "GitHub Actions deploy for ${{ github.sha }}" \
              '{composeId: $composeId, title: $title, description: $description}'
          )"

          response_file="$(mktemp)"
          http_code="$(
            curl -sS -o "$response_file" -w "%{http_code}" \
              -X POST "$dokploy_api_url/api/compose.redeploy" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $dokploy_api_key" \
              --data "$payload"
          )"

          echo "Dokploy HTTP status: $http_code"
          cat "$response_file"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Dokploy redeploy request failed."
            exit 1
          fi
