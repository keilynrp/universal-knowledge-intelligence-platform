name: Docker Images

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Authenticated Docker Hub pulls have a far higher rate limit, which avoids the
  # transient anonymous-pull timeouts that fail base-image fetches (issue #20).
  # Optional: the login steps below are no-ops until these secrets are set.
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub (raises base-image pull rate limit; no-op if unset)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ukip-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: true
          tags: scan-target-backend:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}

      - name: Trivy scan (blocks new CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target-backend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: scan-target-backend:${{ github.sha }}
          format: spdx-json
          artifact-name: sbom-backend-${{ github.sha }}.spdx.json

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: true
          no-cache: true
          build-args: |
            APP_VERSION=${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub (raises base-image pull rate limit; no-op if unset)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract frontend metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ukip-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally for scanning
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: scan-target-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.ukip.inbounduxd.com' }}
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}
            APP_VERSION=${{ github.sha }}

      - name: Trivy scan (blocks new CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target-frontend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: scan-target-frontend:${{ github.sha }}
          format: spdx-json
          artifact-name: sbom-frontend-${{ github.sha }}.spdx.json

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: true
          no-cache: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.ukip.inbounduxd.com' }}
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}
            APP_VERSION=${{ github.sha }}

  build-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub (raises base-image pull rate limit; no-op if unset)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract engine metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ukip-engine
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally for scanning
        uses: docker/build-push-action@v7
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: false
          load: true
          tags: scan-target-engine:${{ github.sha }}

      - name: Trivy scan (blocks new CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target-engine:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: scan-target-engine:${{ github.sha }}
          format: spdx-json
          artifact-name: sbom-engine-${{ github.sha }}.spdx.json

      - name: Build engine image
        uses: docker/build-push-action@v7
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: true
          no-cache: true

  deploy:
    needs: [build-backend, build-frontend, build-engine]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Trigger Dokploy deploy
        # Use compose.deploy (NOT compose.redeploy): deploy performs a fresh git
        # clone so changes to docker-compose.prod.yml (e.g. new services/env vars)
        # are picked up. redeploy rebuilds from the previously-cloned source and
        # silently ignores compose changes — which once left REDIS_URL unset in
        # prod despite the file being merged.
        run: |
          set -euo pipefail

          dokploy_api_url="$(printf '%s' '${{ secrets.DOKPLOY_API_URL }}' | tr -d '\r\n' | sed 's:/*$::')"
          dokploy_api_key="$(printf '%s' '${{ secrets.DOKPLOY_API_KEY }}' | tr -d '\r\n')"
          dokploy_compose_id="$(printf '%s' '${{ secrets.DOKPLOY_COMPOSE_ID }}' | tr -d '\r\n')"

          if [ -z "$dokploy_api_url" ] || [ -z "$dokploy_api_key" ] || [ -z "$dokploy_compose_id" ]; then
            echo "Missing Dokploy API secrets. Set DOKPLOY_API_URL, DOKPLOY_API_KEY, and DOKPLOY_COMPOSE_ID."
            exit 1
          fi

          payload="$(
            jq -n \
              --arg composeId "$dokploy_compose_id" \
              --arg title "UKIP CI deploy" \
              --arg description "GitHub Actions deploy for ${{ github.sha }}" \
              '{composeId: $composeId, title: $title, description: $description}'
          )"

          response_file="$(mktemp)"
          http_code="$(
            curl -sS -o "$response_file" -w "%{http_code}" \
              -X POST "$dokploy_api_url/api/compose.deploy" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $dokploy_api_key" \
              --data "$payload"
          )"

          echo "Dokploy HTTP status: $http_code"
          cat "$response_file"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Dokploy deploy request failed."
            exit 1
          fi

      - name: Verify the deploy actually landed
        # compose.deploy returns as soon as Dokploy ACCEPTS the request, so the
        # step above proves only that the call was made. On 2026-07-23 this job
        # reported success on three consecutive runs while production was in
        # fact failing to pull images — CI was green and prod was down.
        #
        # Poll the two public surfaces until both report the commit this run
        # built. /health.version comes from UKIP_APP_VERSION (baked by
        # Dockerfile.backend); the frontend embeds it via NEXT_PUBLIC_APP_VERSION.
        env:
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.ukip.inbounduxd.com' }}
          APP_URL: ${{ vars.PUBLIC_APP_URL || 'https://ukip.inbounduxd.com' }}
          EXPECTED_SHA: ${{ github.sha }}
        # Custom shell WITHOUT -e. Actions' default is `bash -e {0}`, and that
        # flag is set on the command line, so a `set +e`/`set -uo pipefail`
        # inside the script cannot undo it for the whole run. The first version
        # of this gate learned that the hard way: the backend served non-JSON
        # for a moment during the restart, jq exited non-zero, and -e killed the
        # poll after 33 seconds instead of letting it retry for 15 minutes.
        shell: bash --noprofile --norc -uo pipefail {0}
        run: |
          # Transient failures below are EXPECTED while the container restarts,
          # so every fallible command is explicitly non-fatal as well. Belt and
          # braces: the shell override alone would suffice, but this step's whole
          # job is to keep polling through exactly these errors.

          timeout_s=900
          deadline=$(( SECONDS + timeout_s ))
          backend_ok=0
          frontend_ok=0

          while [ "$SECONDS" -lt "$deadline" ]; do
            if [ "$backend_ok" -eq 0 ]; then
              # A restarting container can answer with non-JSON (proxy error
              # page), which makes jq exit non-zero. Swallow it and retry.
              got="$(curl -sS --max-time 15 "$API_URL/health" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || true)"
              if [ -n "$got" ] && [ "$got" = "$EXPECTED_SHA" ]; then
                echo "backend  ✓ serving $EXPECTED_SHA"
                backend_ok=1
              fi
            fi

            if [ "$frontend_ok" -eq 0 ]; then
              if curl -sS --max-time 15 "$APP_URL" 2>/dev/null | grep -q "$EXPECTED_SHA" 2>/dev/null; then
                echo "frontend ✓ serving $EXPECTED_SHA"
                frontend_ok=1
              fi
            fi

            if [ "$backend_ok" -eq 1 ] && [ "$frontend_ok" -eq 1 ]; then
              echo "Deploy verified — both surfaces are serving $EXPECTED_SHA."
              exit 0
            fi

            sleep 15
          done

          echo "::error::Deploy did not land within ${timeout_s}s (backend_ok=$backend_ok frontend_ok=$frontend_ok, expected $EXPECTED_SHA)"
          echo "--- backend /health ---"
          curl -sS --max-time 15 "$API_URL/health" || echo "(unreachable)"
          exit 1
