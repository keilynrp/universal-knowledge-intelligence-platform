name: Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ukip_test
          POSTGRES_PASSWORD: ukip_test_pw
          POSTGRES_DB: ukip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ukip_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -c requirements.lock

      - name: Run tests with coverage
        env:
          ADMIN_USERNAME: testadmin
          ADMIN_PASSWORD: testpassword
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only-not-production
          ENCRYPTION_KEY: "vRHc0zVcTXbRfUBZEsKNal2lMCfINwDh90EXE8vu2Ew="
          DATABASE_URL: "postgresql+psycopg2://ukip_test:ukip_test_pw@localhost:5432/ukip_test"
          UKIP_DB_MODE: postgres
          ALLOWED_ORIGINS: "http://localhost:3004"
          UKIP_SKIP_STARTUP_SIDE_EFFECTS: "1"
          SENTRY_ENABLED: "0"
        run: |
          pip install pytest-cov -c requirements.lock
          pytest backend/tests/ \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
