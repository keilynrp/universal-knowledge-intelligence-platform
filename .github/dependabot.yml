version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # grpcio, grpcio-tools and protobuf must move in lockstep — grpcio-tools
      # hard-pins a compatible protobuf major, so a partial bump breaks install.
      grpc-protobuf:
        patterns:
          - "grpcio"
          - "grpcio-tools"
          - "protobuf"
    ignore:
      # Deliberately staying on protobuf 6 / grpcio-tools 1.81.x. grpcio-tools
      # 1.82+ forces protobuf>=7.35.1 (major), which cascades through the
      # transitive otel/googleapis stack for no runtime benefit (grpcio-tools is
      # build-only). Un-ignore when doing the protobuf-7 modernization. See #147.
      - dependency-name: "grpcio-tools"
        versions: [">=1.82.0"]
      - dependency-name: "protobuf"
        versions: [">=7.0.0"]
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # react and react-dom must be the exact same version; keep their type
      # packages together so a bump never lands one without the others.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
