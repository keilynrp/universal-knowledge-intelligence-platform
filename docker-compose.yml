# ── UKIP — Universal Knowledge Intelligence Platform ─────────────────────────
# Production-ready docker-compose with PostgreSQL 16.
#
# Quick start:
#   cp .env.example .env          # fill in JWT_SECRET_KEY and other secrets
#   docker compose up -d
#   docker compose logs -f ukip-backend
#
# Access:
#   Backend API  → http://localhost:8000
#   API docs     → http://localhost:8000/docs
#   Frontend     → http://localhost:3004

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ukip}
      POSTGRES_USER:     ${POSTGRES_USER:-ukip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ukip_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ukip} -d ${POSTGRES_DB:-ukip}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── UKIP Backend (FastAPI + Uvicorn) ────────────────────────────────────────
  ukip-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ukip-engine:
        condition: service_started
    environment:
      DATABASE_URL:       ${DOCKER_DATABASE_URL:-}
      POSTGRES_HOST:      ${DOCKER_POSTGRES_HOST:-postgres}
      POSTGRES_PORT:      ${DOCKER_POSTGRES_PORT:-5432}
      POSTGRES_DB:        ${DOCKER_POSTGRES_DB:-ukip}
      POSTGRES_USER:      ${DOCKER_POSTGRES_USER:-ukip}
      POSTGRES_PASSWORD:  ${DOCKER_POSTGRES_PASSWORD:-ukip_secret}
      DB_POOL_SIZE:       ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW:    ${DB_MAX_OVERFLOW:-10}
      ADMIN_USERNAME:     ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:     ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      JWT_SECRET_KEY:     ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      ENCRYPTION_KEY:     ${ENCRYPTION_KEY:-}
      ALLOWED_ORIGINS:    ${ALLOWED_ORIGINS:-http://localhost:3004}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-changeit}
      LOG_LEVEL:          ${LOG_LEVEL:-INFO}
      ENGINE_GRPC_URL:    ${ENGINE_GRPC_URL:-ukip-engine:50051}
      ENGINE_AUTH_TOKEN:  ${ENGINE_AUTH_TOKEN:-dev-secret}
      ENGINE_SYNC_THRESHOLD: ${ENGINE_SYNC_THRESHOLD:-500}
      ENGINE_SHADOW_MODE: ${ENGINE_SHADOW_MODE:-false}
      ENGINE_FALLBACK_PYTHON: ${ENGINE_FALLBACK_PYTHON:-true}
    ports:
      - "8000:8000"
    volumes:
      - static_files:/app/static
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── UKIP Engine (Rust gRPC) ─────────────────────────────────────────────────
  ukip-engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENGINE_DATABASE_URL: postgresql://${DOCKER_POSTGRES_USER:-ukip}:${DOCKER_POSTGRES_PASSWORD:-ukip_secret}@postgres:5432/${DOCKER_POSTGRES_DB:-ukip}
      ENGINE_GRPC_PORT:    ${ENGINE_GRPC_PORT:-50051}
      ENGINE_LOG_LEVEL:    ${ENGINE_LOG_LEVEL:-info}
      ENGINE_AUTH_TOKEN:   ${ENGINE_AUTH_TOKEN:-dev-secret}
      ENGINE_MAX_CONCURRENT_JOBS: ${ENGINE_MAX_CONCURRENT_JOBS:-4}
    # Port 50051 is NOT exposed to the host — only accessible within Docker network
    healthcheck:
      test: ["CMD", "/app/engine", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── UKIP Frontend (Next.js) ─────────────────────────────────────────────────
  ukip-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${DOCKER_FRONTEND_API_URL:-http://ukip-backend:8000}
    restart: unless-stopped
    depends_on:
      - ukip-backend
    environment:
      NEXT_PUBLIC_API_URL: ${DOCKER_FRONTEND_API_URL:-http://ukip-backend:8000}
    ports:
      - "3004:3004"

volumes:
  postgres_data:
  static_files:
